title: PowerShell Encoded Command Execution
id: 7f5d1b2a-3c4e-4f6a-9b8d-2e1f0a5c7d9e
status: test
description: Detects execution of PowerShell with encoded command arguments, commonly used by adversaries to obfuscate malicious scripts
author: jac-mon
date: 2026-06-11
references:
  - https://attack.mitre.org/techniques/T1059/001/
tags:
  - attack.execution
  - attack.t1059.001
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains:
      - ' -EncodedCommand '
      - ' -enc '
      - ' -ec '
  condition: selection
falsepositives:
  - Legitimate administrative scripts using encoded commands
  - Software deployment tools
level: medium
fields:
  - CommandLine
  - ParentImage
  - User
